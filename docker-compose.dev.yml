services:
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinemabro-bot-dev
    restart: unless-stopped
    env_file:
      - .env.dev
    command: sh -c "npm run dev:seeded"
    depends_on:
      postgres-dev:
        condition: service_healthy

  postgres-dev:
    image: postgres:16-alpine
    container_name: cinemabro-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cinemabro_dev}
      POSTGRES_USER: ${POSTGRES_USER:-cinemabro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cinemabro}
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinemabro} -d ${POSTGRES_DB:-cinemabro_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
