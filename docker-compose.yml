services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinemabro-bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: cinemabro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cinemabro}
      POSTGRES_USER: ${POSTGRES_USER:-cinemabro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cinemabro} -d ${POSTGRES_DB:-cinemabro}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
